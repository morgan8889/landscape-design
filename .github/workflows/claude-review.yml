name: Claude Code

on:
  # Automatic review on every PR
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

  # Interactive @claude mentions
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  # Automatic code review on every PR open/push
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request against the project's CLAUDE.md guidelines and constitution.
            Focus on:
            - Code quality and adherence to project conventions
            - Potential bugs, logic errors, or edge cases
            - Security implications (OWASP top 10)
            - Test coverage — are acceptance scenarios tested?
            - Constitution compliance (User-Centric, Data Accuracy, Test-First, Incremental Delivery, Simplicity)

            Use `gh pr comment` for top-level summary feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for specific code issues.
            Only post GitHub comments — do not submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
            --model claude-sonnet-4-6

  # Interactive @claude mentions for fixes and questions
  claude-respond:
    if: |
      github.event_name != 'pull_request' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: |
            --max-turns 10
            --model claude-sonnet-4-6
            --append-system-prompt "Follow CLAUDE.md guidelines. All fixes must pass tests before pushing."
