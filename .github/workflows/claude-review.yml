name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  auto-review:
    if: github.event_name == 'pull_request' && github.actor != 'claude[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            You are a security reviewer examining this PR with fresh eyes.

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            The author has already run local code reviews for spec compliance and code quality.
            Your role is to provide orthogonal perspective the author cannot give themselves:

            1. Security vulnerabilities (OWASP Top 10): injection, XSS, insecure data exposure, broken access control
            2. Supply chain risks: new dependencies, version pins, suspicious package names
            3. Secrets/credentials accidentally committed
            4. Logic bugs that only appear at boundaries (off-by-one, null handling, race conditions)
            5. Any concern that a fresh reviewer would catch that self-review misses

            Be concise. Only flag genuine issues — skip style/naming/formatting.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for specific code issues.
            Only post GitHub comments — do not submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"

  claude-respond:
    if: |
      github.event_name != 'pull_request' &&
      contains(github.event.comment.body || '', '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
